name: Monitor Citas Ciencia

on:
  schedule:
    # Backup: por si cron-job.org falla, GitHub intenta cada 5 min
    # (los crons de GitHub pueden retrasarse mucho cuando hay carga)
    - cron: "*/5 * * * *"
  workflow_dispatch:  # Ejecución manual desde la pestaña Actions
  repository_dispatch:  # Disparador externo desde cron-job.org
    types: [check-citas]

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_citas.py

      - name: Subir capturas de pantalla (para debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capturas-${{ github.run_number }}
          path: |
            paso1_inicio.png
            paso2_opciones_sucursal.png
            paso2_fallo.png
            paso3_sucursal_elegida.png
            paso4_opciones_servicio.png
            paso6_estado_final.png
            hay_citas.png
            error.png
            debug_paso2.html
            debug_paso3.html
            debug_paso4.html
            debug_paso5.html
          if-no-files-found: ignore
          retention-days: 3
